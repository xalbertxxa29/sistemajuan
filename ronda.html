<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ronda QR</title>
  <!-- ZXing QR Scanner -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.2/umd/index.min.js"></script>

  <!-- Estilos -->
  <link rel="stylesheet" href="/style.css?v=83" />
  <link rel="stylesheet" href="/webview.css?v=83" />
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">

  <!-- Meta PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    body {
      background: var(--background, #111);
      color: var(--text-primary, #fff);
    }

    .page {
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface, #222);
      border-bottom: 1px solid var(--border, #333);
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      margin: 0;
      font-size: 1.3em;
      color: var(--text-primary, #fff);
    }

    header button {
      background: transparent;
      border: none;
      color: var(--primary, #3b82f6);
      cursor: pointer;
      font-size: 1.1em;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      max-width: 100%;
    }

    #rondas-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-iniciar-ronda:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-iniciar-ronda:active:not(:disabled) {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <!-- Splash Screen Estático (Instantáneo) -->
  <div id="app-splash"
    style="position:fixed; inset:0; z-index:10000; background:#0b1120; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity .4s ease;">
    <div style="margin-bottom:24px;">
      <img src="imagenes/logo_192.png" alt="Liderman"
        style="width:80px; height:80px; border-radius:50%; box-shadow: 0 0 20px rgba(48,209,88,.2);"
        onerror="this.style.display='none'">
    </div>
    <div class="loader-ring"
      style="width:40px; height:40px; border:3px solid rgba(255,255,255,.1); border-top-color:#30d158; border-radius:50%; animation: spin 1s linear infinite;">
    </div>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </div>

  <div class="page">
    <header>
      <h1>Rondas QR</h1>
      <button id="btn-menu" title="Menú">
        <i class="fas fa-arrow-left"></i>
      </button>
    </header>

    <main>
      <div id="rondas-list">
        <!-- Se llenará con las rondas -->
      </div>
    </main>
  </div>

  <!-- Modal: Seleccionar tipo de Ronda -->
  <div id="modal-tipo-ronda" style="
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 5000;
  ">
    <div style="
      background: rgba(30, 41, 59, 0.95); 
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px; padding: 40px;
      text-align: center; max-width: 420px; width: 92%;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    ">
      <div style="
        width: 64px; height: 64px; background: rgba(59, 130, 246, 0.1); 
        border-radius: 16px; display: flex; align-items: center; justify-content: center;
        margin: 0 auto 24px; color: #3b82f6; font-size: 1.8em;
      ">
        <i class="fas fa-route"></i>
      </div>

      <h2 style="margin: 0 0 10px 0; color: #fff; font-size: 1.5em; font-weight: 700; letter-spacing: -0.02em;">
        Tipo de Ronda
      </h2>
      <p style="color: #94a3b8; font-size: 0.95em; margin: 0 0 32px 0; line-height: 1.5;">
        Selecciona el modo de operación para iniciar el registro de tus actividades.
      </p>

      <div style="display: flex; flex-direction: column; gap: 16px;">
        <button id="btn-ronda-programada" style="
          background: linear-gradient(135deg, #3b82f6, #2563eb); 
          color: white; border: none; padding: 16px; border-radius: 12px; 
          font-weight: 600; font-size: 1em; cursor: pointer; transition: all 0.3s ease;
          display: flex; align-items: center; justify-content: center; gap: 12px;
          box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        " onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 15px -3px rgba(37, 99, 235, 0.4)';"
          onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 6px -1px rgba(37, 99, 235, 0.2)';">
          <i class="fas fa-calendar-alt"></i> Ronda Programada
        </button>

        <button id="btn-ronda-manual" style="
          background: rgba(255, 255, 255, 0.05);
          color: #f8fafc; border: 1px solid rgba(255, 255, 255, 0.1);
          padding: 16px; border-radius: 12px; font-weight: 600;
          font-size: 1em; cursor: pointer; transition: all 0.3s ease;
          display: flex; align-items: center; justify-content: center; gap: 12px;
        " onmouseover="this.style.background='rgba(255, 255, 255, 0.1)';this.style.transform='translateY(-2px)';"
          onmouseout="this.style.background='rgba(255, 255, 255, 0.05)';this.style.transform='translateY(0)';">
          <i class="fas fa-qrcode"></i> Ronda Manual
        </button>

        <button id="btn-cerrar-modal" style="
          background: transparent; color: #64748b; border: none;
          padding: 12px; margin-top: 8px; cursor: pointer;
          font-size: 0.9em; font-weight: 500; transition: color 0.2s;
        " onmouseover="this.style.color='#94a3b8';" onmouseout="this.style.color='#64748b';">
          Cancelar y Volver
        </button>
      </div>
    </div>
  </div>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>

  <!-- Config e Inicialización -->
  <script src="/firebase-config.js?v=83"></script>
  <script src="/initFirebase.js?v=83"></script>
  <script src="/offline-storage.js?v=83"></script>
  <script src="/ui.js?v=83"></script>
  <script src="/webview.js?v=83"></script>

  <!-- Sistema de sincronización para WebView (DEBE CARGAR ANTES DE ronda-v2.js) -->
  <script src="/offline-queue.js?v=83"></script>
  <script src="/sync.js?v=83"></script>

  <!-- Lógica Ronda v2 (mejorada) -->
  <script src="/sync-engine.js?v=83"></script>
  <script src="/ronda-v2.js?v=83"></script>
  <script src="/ronda-sync.js?v=83"></script>

  <!-- SW -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => { });
    }

    // Botón atrás - ir a menu.html
    document.getElementById('btn-menu')?.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      location.href = 'menu.html';
    });
  </script>
</body>

</html>
